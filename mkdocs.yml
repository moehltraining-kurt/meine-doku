site_name: Meine Doku

theme:
  name: material
  language: de
  logo: assets/logo.png
  palette:
    primary: indigo
  features:
    - content.code.copy
    - navigation.expand
    - header.autohide

nav:
  - Meine Doku: index.md
  - Einrichtung: setup.md
  - Impressum: impressum.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
